[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "kstelakis"
name = "Is_The_Scoutmaster_Close"
description = "How close are you to spawning the scoutmaster? Will you be the target if he spawns? A very light mod that gives you that info"
websiteUrl = "https://github.com/Stelios-Kourlis/PEAK-Mods"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_PEAK = "5.4.2403"
PEAKModding-PEAKLib_UI = "1.6.1"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/IsTheScoutmasterClose/release/com.github.Stelios-Kourlis.IsTheScoutmasterClose.dll"
target = "plugins/"

[[build.copy]]
source = "../../CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../../LICENSE"
target = "/"

# The following config options only apply when using TCLI to publish to Thunderstore directly:

[publish]
# See communities at:
# https://thunderstore.io/api/experimental/community/
communities = ["peak"]

[publish.categories]
# See categories at:
# https://thunderstore.io/api/experimental/community/peak/category/
peak = ["mods"]
